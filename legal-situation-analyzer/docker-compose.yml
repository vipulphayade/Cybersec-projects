services:
  db:
    build:
      context: .
      dockerfile: docker/Dockerfile.database
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-legal_analyzer}
      POSTGRES_USER: ${POSTGRES_USER:-legal_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdevpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-legal_app} -d ${POSTGRES_DB:-legal_analyzer}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-legal_analyzer}
      DB_USER: ${POSTGRES_USER:-legal_app}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-localdevpassword}
      API_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      ALLOWED_HOSTS: localhost,127.0.0.1,api,frontend
      API_RATE_LIMIT: ${API_RATE_LIMIT:-20/minute}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-sentence-transformers/all-MiniLM-L6-v2}
      MINIMUM_DATASET_SIZE: ${MINIMUM_DATASET_SIZE:-229}
      APP_ROOT: /app

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    depends_on:
      api:
        condition: service_started
    ports:
      - "8080:8080"

volumes:
  postgres_data:
