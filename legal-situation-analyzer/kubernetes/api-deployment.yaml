apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: legal-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: legal-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: legal-api
  template:
    metadata:
      labels:
        app: legal-api
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: legal-situation-analyzer-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: legal-situation-analyzer-secrets
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: legal-situation-analyzer-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: legal-situation-analyzer-secrets
                  key: DB_PASSWORD
            - name: API_ALLOWED_ORIGINS
              value: "http://localhost:8080"
            - name: ALLOWED_HOSTS
              value: "localhost,127.0.0.1,api,frontend"
            - name: API_RATE_LIMIT
              value: "20/minute"
            - name: EMBEDDING_MODEL_NAME
              value: "sentence-transformers/all-MiniLM-L6-v2"
            - name: MINIMUM_DATASET_SIZE
              value: "229"
            - name: APP_ROOT
              value: "/app"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
